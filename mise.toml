[tools]
python = "3.14"
sqlite = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.install]
run = "pip install fastapi uvicorn sqlalchemy pytest httpx"

[tasks.serve]
run = "APP_ENV=dev uvicorn app.main:app --reload"

[tasks.test]
run = """
rm -f test.db
APP_ENV=test pytest
rm -f test.db
"""
